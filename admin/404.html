<!doctype html>
<html lang="en">
  <!--Most productions will have this automatically displayed when a broken link is entered-->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Joyalty Photography</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Quintessential&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="https://joyaltyphotography.netlify.app/images/templatemo-logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="assets/404.css" />
  </head>

  <body>
    <div class="wrap">
      <img
        src="https://joyaltyphotography.netlify.app/images/templatemo-logo.png"
        class="logo"
        alt="Joyalty Photography"
      />

      <div class="shutter">
        <div class="shutter-circle"></div>
        <div class="shutter-circle"></div>
        <div class="shutter-circle"></div>
        <div class="shutter-inner">📷</div>
      </div>

      <div class="code">404</div>
      <h1>This shot didn't develop</h1>
      <p>
        The page you're looking for has moved, been deleted, or never existed.
        Let's get you back to somewhere that does.
      </p>

      <div class="btn-group">
        <a href="/" class="btn-primary">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9,22 9,12 15,12 15,22" />
          </svg>
          Go Home
        </a>
        <a href="/portfolio.html" class="btn-outline">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21,15 16,10 5,21" />
          </svg>
          View Portfolio
        </a>
      </div>

      <p class="footer-note">© 2026 Joyalty Photography</p>
    </div>
  </body>
</html>
