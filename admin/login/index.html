<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joyalty Admin — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Quintessential&display=swap"
        rel="stylesheet" />
    <script src="https://kit.fontawesome.com/f3068f95b3.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="https://joyaltyphotography.netlify.app/images/templatemo-logo.png"
        type="image/x-icon">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="../assets/auth.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/auth.css" />

</head>

<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="login-wrap">
        <div class="login-logo">
            <img src="https://joyaltyphotography.netlify.app/images/templatemo-logo.png" alt="Joyalty">
            <h1>JO<span>Y</span>ALTY</h1>
            <p>Admin Dashboard</p>
        </div>

        <div id="errorBox" class="error-box"></div>

        <div class="field-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" class="field-input" placeholder="admin@joyalty.com"
                autocomplete="email">
        </div>
        <div class="field-group">
            <label>Password</label>
            <div class="pw-wrap">
                <input type="password" id="loginPass" class="field-input" placeholder="••••••••"
                    autocomplete="current-password">
                <button type="button" class="pw-eye" onclick="togglePw()" tabindex="-1">
                    <i class="fa-solid fa-eye" id="pwIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">
            <span id="btnText">Sign In</span>
        </button>

        <a href="/" class="back-link"><i class="fa-solid fa-arrow-left" style="font-size:.7rem"></i> Back to main
            site</a>
    </div>
    <script src="assets/js/auth.js"></script>
</body>

</html>
